<style>
  html, body {
    margin: 0;
    background: #efe6cf;
    padding: 16px 12px calc(16px + env(safe-area-inset-bottom));
    padding-top: calc(16px + env(safe-area-inset-top));

<body>
<div id="ledger-root"></div>
<style>
  #ledger-root {
    --ink: #1c2b26;
    --paper: #f5efe1;
    --paper-line: #e2d6b8;
    --teal: #14453d;
    --teal-deep: #0b2b26;
    --gold: #b8863b;
    --gold-soft: #e6c98a;
    --red: #9c3b34;
    --green: #2f6b4f;
    --muted: #6f6252;
    --card-bg: #fffdf7;
    --hover-bg: rgba(184,134,59,0.06);
    --page-bg: #efe6cf;
    font-family: 'Noto Sans Thai', 'Sarabun', system-ui, sans-serif;
    color: var(--ink);
    background: transparent;
    max-width: 720px;
    margin: 0 auto;
    -webkit-font-smoothing: antialiased;
    position: relative;
  }
  #ledger-root.dark {
    --ink: #d9d3c5;
    --paper: #181d1a;
    --paper-line: #2b332e;
    --teal: #2f6e5f;
    --teal-deep: #101b17;
    --gold: #c9a15f;
    --gold-soft: #ddc290;
    --red: #d17a70;
    --green: #6bab8c;
    --muted: #8b9289;
    --card-bg: #1f2521;
    --hover-bg: rgba(201,161,95,0.07);
    --page-bg: #0d100e;
  }
  #ledger-root * { box-sizing: border-box; }

  .lb-book { background: var(--paper); border-radius: 18px; overflow: hidden; box-shadow: 0 2px 6px rgba(11,43,38,0.10), 0 20px 44px -18px rgba(11,43,38,0.38); border: 1px solid var(--paper-line); position: relative; }

  .lb-header { background: linear-gradient(155deg, var(--teal) 0%, var(--teal-deep) 100%); color: var(--paper); padding: 22px 24px 18px; position: relative; }
  .lb-header::after { content: ""; position: absolute; left: 0; right: 0; bottom: -1px; height: 10px; background: repeating-linear-gradient(90deg, var(--paper) 0 10px, transparent 10px 16px); mask: linear-gradient(90deg, transparent, black 4%, black 96%, transparent); }
  .lb-eyebrow { font-size: 11px; letter-spacing: .16em; text-transform: uppercase; color: var(--gold-soft); margin: 0 0 4px; font-weight: 600; }
  .lb-title-row { display:flex; align-items:baseline; justify-content: space-between; gap: 8px; flex-wrap: wrap; }
  .lb-title { font-family: Georgia, 'Times New Roman', serif; font-size: 24px; margin: 0 0 16px; font-weight: 700; letter-spacing: .01em; }
  .lb-streak { font-size: 12px; background: rgba(230,201,138,0.18); color: var(--gold-soft); padding: 4px 10px; border-radius: 20px; font-weight: 700; white-space: nowrap; }
  .lb-theme-btn { border: 1px solid rgba(245,239,225,0.3); background: rgba(245,239,225,0.08); color: var(--paper); width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; display:flex; align-items:center; justify-content:center; flex: none; }
  .lb-headrow-right { display:flex; align-items:center; gap:8px; }
  .lb-userchip { display:flex; align-items:center; gap:8px; margin-top:10px; font-size:12px; color: rgba(245,239,225,0.85); }
  .lb-userchip img { width:22px; height:22px; border-radius:50%; }
  .lb-userchip span { flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .lb-userchip button { border:1px solid rgba(245,239,225,0.25); background:rgba(245,239,225,0.06); color:inherit; font-size:11px; padding:4px 9px; border-radius:20px; cursor:pointer; flex:none; }

  .lb-lock-overlay { position: fixed; inset: 0; background: linear-gradient(155deg, #14453d 0%, #0b2b26 100%); display:flex; align-items:center; justify-content:center; z-index: 100; padding: 20px; }
  .lb-lock-card { background: var(--paper); border-radius: 16px; padding: 28px 24px; max-width: 340px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,0.35); text-align:center; }
  .lb-lock-icon { font-size: 32px; margin-bottom: 10px; }
  .lb-lock-card h3 { font-family: Georgia, serif; margin: 0 0 6px; font-size: 18px; color: var(--ink); }
  .lb-lock-card p { font-size: 12.5px; color: var(--muted); margin: 0 0 16px; line-height: 1.5; }
  .lb-lock-card input { width: 100%; font-family: inherit; font-size: 14px; padding: 11px 12px; border-radius: 9px; border: 1px solid var(--paper-line); background: var(--card-bg); color: var(--ink); margin-bottom: 10px; text-align: center; }
  .lb-lock-card button { width: 100%; border: none; padding: 11px; border-radius: 9px; background: var(--gold); color: #2a1c04; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer; }
  .lb-lock-error { color: var(--red); font-size: 12px; font-weight: 700; margin: -4px 0 10px; }
  .lb-lock-hint { font-size: 11px; color: var(--muted); margin-top: 12px; }
  .lb-lock-hint button { width: auto; background: none; border: none; color: var(--teal); font-weight: 700; text-decoration: underline; cursor: pointer; padding: 0; font-size: 11px; }
  .lb-balance-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .lb-balance-label { font-size: 12.5px; color: var(--gold-soft); }
  .lb-balance-amt { font-variant-numeric: tabular-nums; font-size: 30px; font-weight: 700; font-family: Georgia, serif; }
  .lb-networth { font-size: 12px; color: var(--gold-soft); margin-top: 4px; }
  .lb-networth b { color: #fff; font-variant-numeric: tabular-nums; }

  .lb-maintabs { display: flex; gap: 2px; padding: 0 22px; margin-top: 14px; border-bottom: 1px solid var(--paper-line); background: var(--paper); flex-wrap: wrap; }
  .lb-maintabs button { border: none; background: transparent; font-family: inherit; padding: 11px 4px; margin-right: 18px; font-size: 13.5px; font-weight: 700; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .lb-maintabs button.active { color: var(--teal); border-bottom-color: var(--gold); }

  .lb-toolbar { display: flex; gap: 8px; padding: 12px 22px 0; flex-wrap: wrap; }
  .lb-tbtn { border: 1px solid var(--paper-line); background: var(--card-bg); color: var(--teal); font-family: inherit; font-size: 12px; font-weight: 600; padding: 6px 11px; border-radius: 7px; cursor: pointer; }
  .lb-tbtn:hover { background: #fbf5e6; }

  .lb-periods { display: flex; align-items: center; gap: 6px; padding: 12px 22px 0; flex-wrap: wrap; }
  .lb-ptabs { display: flex; background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 8px; overflow: hidden; }
  .lb-ptabs button { border: none; background: transparent; padding: 7px 12px; font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--muted); cursor: pointer; }
  .lb-ptabs button.active { background: var(--teal); color: #fff; }
  .lb-pnav { display: flex; align-items: center; gap: 4px; margin-left: auto; }
  .lb-pnav button { border: 1px solid var(--paper-line); background: var(--card-bg); width: 28px; height: 28px; border-radius: 7px; cursor: pointer; font-size: 13px; color: var(--teal); }
  .lb-pnav button:disabled { opacity: .35; cursor: default; }
  .lb-customrange { display: flex; align-items: center; gap: 8px; margin-left: auto; font-size: 12px; color: var(--muted); }
  .lb-customrange input[type="date"] { border: 1px solid var(--paper-line); background: var(--card-bg); color: var(--ink); border-radius: 7px; padding: 5px 8px; font-family: inherit; font-size: 12px; }
  .lb-compare-box { background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; }
  .lb-compare-row { display: flex; align-items: center; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--paper-line); }
  .lb-compare-row:last-of-type { border-bottom: none; }
  .lb-compare-name { font-size: 12.5px; color: var(--ink); font-weight: 600; flex: 1; }
  .lb-compare-amt { font-variant-numeric: tabular-nums; font-size: 13px; font-weight: 700; }
  .lb-delta { font-size: 11.5px; font-weight: 700; min-width: 62px; text-align: right; }
  .lb-delta.good { color: var(--green); }
  .lb-delta.bad { color: var(--red); }
  .lb-delta.flat { color: var(--muted); font-weight: 600; }
  .lb-compare-sub { font-size: 11px; color: var(--muted); text-align: center; margin-top: 8px; }
  .lb-plabel { font-size: 12.5px; font-weight: 700; color: var(--ink); padding: 0 4px; white-space: nowrap; }

  .lb-dash { padding: 18px 22px 22px; }
  .lb-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  .lb-card { background: var(--card-bg); border: 1px solid var(--paper-line); border-left: 4px solid var(--teal); border-radius: 11px; padding: 13px 14px; box-shadow: 0 1px 2px rgba(28,43,38,0.05); transition: transform .15s, box-shadow .15s; }
  .lb-card:hover { transform: translateY(-1px); box-shadow: 0 4px 10px rgba(28,43,38,0.08); }
  .lb-card.c-income { border-left-color: var(--green); }
  .lb-card.c-expense { border-left-color: var(--red); }
  .lb-card.c-nec { border-left-color: var(--teal); }
  .lb-card.c-unnec { border-left-color: var(--gold); }
  .lb-card-label { font-size: 11px; color: var(--muted); font-weight: 600; margin-bottom: 4px; }
  .lb-card-amt { font-variant-numeric: tabular-nums; font-size: 19px; font-weight: 700; font-family: Georgia, serif; color: var(--ink); }
  .lb-card-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .lb-dash-sectitle { font-size: 12px; font-weight: 700; color: var(--muted); letter-spacing: .03em; margin: 4px 0 8px; }
  .lb-splitbar { display: flex; height: 22px; border-radius: 6px; overflow: hidden; border: 1px solid var(--paper-line); margin-bottom: 6px; }
  .lb-splitbar .seg-nec { background: var(--teal); }
  .lb-splitbar .seg-unnec { background: var(--gold); }
  .lb-splitlegend { display: flex; gap: 16px; font-size: 12px; color: var(--muted); margin-bottom: 20px; }
  .lb-splitlegend span { display: flex; align-items: center; gap: 5px; }
  .lb-splitlegend i { width: 9px; height: 9px; border-radius: 2px; display: inline-block; }

  .lb-catrow { display: grid; grid-template-columns: 110px 1fr 60px; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12.5px; }
  .lb-catrow-name { color: var(--ink); font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-catbar-track { background: var(--paper-line); border-radius: 5px; height: 8px; overflow: hidden; }
  .lb-catbar-fill { background: var(--red); height: 100%; border-radius: 5px; }
  .lb-catrow-amt { text-align: right; font-variant-numeric: tabular-nums; color: var(--muted); }
  .lb-dash-empty { text-align: center; color: var(--muted); font-size: 13px; padding: 20px 0; }

  .lb-budget-box { background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 10px; padding: 12px 14px; margin-bottom: 20px; }
  .lb-budget-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .lb-budget-row input { flex: 1; font-family: inherit; font-size: 13px; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--paper-line); background: var(--card-bg); }
  .lb-budget-save { border: none; background: var(--teal); color: #fff; font-size: 12px; font-weight: 700; padding: 8px 12px; border-radius: 7px; cursor: pointer; }
  .lb-budget-track { background: var(--paper-line); border-radius: 6px; height: 14px; overflow: hidden; margin-bottom: 6px; }
  .lb-budget-fill { height: 100%; border-radius: 6px; }
  .lb-budget-text { font-size: 12px; color: var(--muted); }
  .lb-budget-warn { font-size: 12px; color: var(--red); font-weight: 700; margin-top: 4px; }

  .lb-trend-svg { width: 100%; height: auto; overflow: visible; }

  .lb-searchrow { display: flex; gap: 8px; padding: 12px 22px 0; }
  .lb-searchrow input, .lb-searchrow select { font-family: inherit; font-size: 13px; padding: 8px 10px; border-radius: 8px; border: 1px solid var(--paper-line); background: var(--card-bg); }
  .lb-searchrow input { flex: 2; min-width: 0; }
  .lb-searchrow select { flex: 1; min-width: 0; }

  .lb-form { padding: 16px 22px 6px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px 12px; border-bottom: 1px dashed var(--paper-line); padding-bottom: 18px; margin-top: 4px; }
  .lb-form.editing { background: rgba(184,134,59,0.08); border-radius: 10px; margin: 10px 22px 0; padding: 14px 14px 16px; width: auto; }
  .lb-edit-banner { grid-column: 1/-1; font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 2px; }
  .lb-field { display: flex; flex-direction: column; gap: 4px; }
  .lb-field.full { grid-column: 1 / -1; }
  .lb-field label { font-size: 11px; color: var(--muted); font-weight: 600; letter-spacing: .03em; }
  .lb-field input, .lb-field select { font-family: inherit; font-size: 14px; padding: 9px 10px; border-radius: 8px; border: 1px solid var(--paper-line); background: var(--card-bg); color: var(--ink); }
  .lb-field input:focus, .lb-field select:focus { outline: 2px solid var(--gold); outline-offset: 1px; }
  .lb-catfield-row { display: flex; gap: 6px; }
  .lb-catfield-row select { flex: 1; }
  .lb-addcat-btn { border: 1px solid var(--paper-line); background: var(--card-bg); width: 34px; border-radius: 8px; cursor: pointer; font-size: 15px; color: var(--teal); flex: none; }
  .lb-addcat-row { display: flex; gap: 6px; margin-top: 6px; }
  .lb-addcat-row input { flex: 1; font-family: inherit; font-size: 13px; padding: 7px 9px; border-radius: 7px; border: 1px solid var(--paper-line); }
  .lb-addcat-row button { border: none; border-radius: 7px; font-size: 12px; font-weight: 700; padding: 0 10px; cursor: pointer; }
  .lb-addcat-row .go { background: var(--teal); color: #fff; }
  .lb-addcat-row .cancel { background: transparent; color: var(--muted); }

  .lb-toggle { display: flex; border-radius: 8px; overflow: hidden; border: 1px solid var(--paper-line); }
  .lb-toggle button { flex: 1; padding: 9px 10px; border: none; background: var(--card-bg); color: var(--muted); font-family: inherit; font-size: 13.5px; font-weight: 600; cursor: pointer; }
  .lb-toggle button.active[data-type="income"] { background: var(--green); color: #fff; }
  .lb-toggle button.active[data-type="expense"] { background: var(--red); color: #fff; }
  .lb-toggle.necessary button.active[data-nec="1"] { background: var(--teal); color: #fff; }
  .lb-toggle.necessary button.active[data-nec="0"] { background: var(--gold); color: #2a1c04; }
  .rec-toggle button.active[data-recnec="1"] { background: var(--teal); color: #fff; }
  .rec-toggle button.active[data-recnec="0"] { background: var(--gold); color: #2a1c04; }

  .lb-submitrow { grid-column: 1 / -1; display: flex; gap: 8px; margin-top: 4px; }
  .lb-submit { flex: 1; padding: 11px; border: none; border-radius: 8px; background: var(--gold); color: #2a1c04; font-family: inherit; font-weight: 700; font-size: 14px; cursor: pointer; transition: filter .15s; }
  .lb-submit:hover { filter: brightness(1.06); }
  .lb-submit:active { filter: brightness(0.96); }
  .lb-cancel-edit { padding: 11px 16px; border: 1px solid var(--paper-line); background: var(--card-bg); border-radius: 8px; color: var(--muted); font-family: inherit; font-weight: 700; font-size: 13px; cursor: pointer; }

  .lb-days-toolbar { display: flex; gap: 8px; padding: 6px 22px 0; }
  .lb-days-toolbtn { border: 1px solid var(--paper-line); background: var(--card-bg); color: var(--teal); font-family: inherit; font-weight: 700; font-size: 11.5px; padding: 5px 10px; border-radius: 20px; cursor: pointer; }
  .lb-days-toolbtn:hover { background: var(--hover-bg); }

  .lb-list-wrap { padding: 4px 0 8px; max-height: 480px; overflow-y: auto; }
  .lb-day-group { padding: 4px 14px; }
  .lb-day-folder { width: 100%; display: flex; align-items: center; gap: 8px; background: var(--card-bg); border: 1px solid var(--paper-line); border-radius: 10px; padding: 9px 12px; cursor: pointer; font-family: inherit; text-align: left; }
  .lb-day-folder:hover { background: var(--hover-bg); }
  .lb-day-group.open .lb-day-folder { border-radius: 10px 10px 0 0; border-bottom-color: transparent; }
  .lb-day-icon { font-size: 14px; flex: none; }
  .lb-day-label { font-size: 12.5px; color: var(--ink); font-weight: 700; letter-spacing: .02em; flex: none; }
  .lb-day-meta { font-size: 11px; color: var(--muted); flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .lb-day-meta-income { color: var(--green); font-weight: 700; }
  .lb-day-meta-expense { color: var(--red); font-weight: 700; }
  .lb-day-chevron { font-size: 11px; color: var(--muted); flex: none; }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithRedirect, signOut as fbSignOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAufKbsgj6dfxCIjhOzoll9gWCOGtm52qo",
  authDomain: "account-book-efb33.firebaseapp.com",
  projectId: "account-book-efb33",
  storageBucket: "account-book-efb33.firebasestorage.app",
  messagingSenderId: "666984933585",
  appId: "1:666984933585:web:f3fcae53687e82ddecbdf0",
  measurementId: "G-EYRV1H9XTJ"
};

const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
const googleProvider = new GoogleAuthProvider();

(function(){
  const root = document.getElementById('ledger-root');

  let currentUser = null; // { uid, email, displayName, photoURL }

  // Persistent storage: backed by Firestore, one document per signed-in user
  // (users/{uid}), each app data section stored as a field on that document.
  const storage = {
    async get(key){
      if (!currentUser) throw new Error('not signed in');
      const snap = await getDoc(doc(db, 'users', currentUser.uid));
      if (!snap.exists()) throw new Error('no data yet');
      const data = snap.data();
      if (!(key in data)) throw new Error('key not found');
      return { key, value: data[key] };
    },
    async set(key, value){
      if (!currentUser) throw new Error('not signed in');
      await setDoc(doc(db, 'users', currentUser.uid), { [key]: value }, { merge: true });
      return { key, value };
    }
  };

  async function signInGoogle(){
    try {
      await signInWithPopup(auth, googleProvider);
    } catch(e) {
      console.error(e);
      if (e && (e.code === 'auth/popup-blocked' || e.code === 'auth/cancelled-popup-request')) {
        try { await signInWithRedirect(auth, googleProvider); return; } catch(e2) { console.error(e2); }
      }
      if (e && e.code === 'auth/unauthorized-domain') {
        alert('โดเมนนี้ยังไม่ได้รับอนุญาตให้ล็อกอิน กรุณาเพิ่ม ' + location.hostname + ' ใน Firebase Console → Authentication → Settings → Authorized domains');
      } else if (e && e.code && e.code !== 'auth/popup-closed-by-user') {
        alert('เข้าสู่ระบบไม่สำเร็จ (' + e.code + ')');
      }
    }
  }

  async function signOutGoogle(){
    await fbSignOut(auth);
  }

  const DEFAULT_CATS = {
    income: ['เงินเดือน', 'โบนัส', 'รายได้พิเศษ', 'อื่นๆ'],
    expense: ['อาหาร', 'เดินทาง', 'ที่พัก/บิล', 'ช้อปปิ้ง', 'สุขภาพ', 'บันเทิง', 'อื่นๆ']
  };
  const PAYMENTS = ['เงินสด', 'โอน/พร้อมเพย์', 'บัตร', 'อื่นๆ'];
  const MONTHS_SHORT = ['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
  const MONTHS_FULL = ['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const ASSET_TYPES = ['เงินฝาก/ออมทรัพย์', 'หุ้น', 'กองทุนรวม', 'ทองคำ', 'คริปโต', 'Forex', 'อื่นๆ'];
  const TXN_LABELS = { contribute: 'เติมเงิน/ลงทุนเพิ่ม', withdraw: 'ถอนเงิน', dividend: 'ปันผล/ดอกเบี้ย' };

  let entries = [];
  let customCats = { income: [], expense: [] };
  let budget = null;
  let assets = [];
  let usdRate = 36;

  let type = 'expense';
  let necessary = 1;
  let period = 'month';
  let offset = 0;
  let customStart = null;
  let customEnd = null;
  let view = 'dashboard';
  let editingId = null;
  let addCatMode = false;
  let searchText = '';
  let filterCategory = '';
  let modal = null;
  let expandedAssetId = null;
  let txnKindByAsset = {};

  let goals = [];
  let recurring = [];
  let theme = 'light';
  let unlocked = false;
  let authLoading = true;
  let dismissedDue = new Set();
  let expandedDays = null;
  let recForm = { name: '', type: 'expense', category: '', amount: '', day: 1, necessary: 1 };
  let goalForm = { name: '', target: '', due: '' };

  function applyTheme(){
    root.classList.toggle('dark', theme === 'dark');
    document.body.style.background = theme === 'dark' ? '#0d100e' : '#efe6cf';
  }

  function pad(n){ return String(n).padStart(2,'0'); }
  function toISO(d){ return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`; }
  function todayStr(){ return toISO(new Date()); }
  function fmt(n){ return Number(n).toLocaleString('th-TH', {minimumFractionDigits:2, maximumFractionDigits:2}); }
  function fmtCcy(n, ccy){ const sym = ccy === 'USD' ? '$' : '฿'; return `${sym}${fmt(n)}`; }
  function pct(n){ return Number(n).toLocaleString('th-TH', {maximumFractionDigits:0}); }
  function catsFor(t){ return DEFAULT_CATS[t].slice(0, -1).concat(customCats[t] || []).concat(['อื่นๆ']); }
  function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

  function thaiDate(iso){
    const d = new Date(iso + 'T00:00:00');
    if (isNaN(d)) return iso;
    return `${d.getDate()} ${MONTHS_SHORT[d.getMonth()]} ${d.getFullYear()+543}`;
  }

  function startOfWeek(d){
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1 - day);
    const m = new Date(d); m.setDate(d.getDate() + diff); m.setHours(0,0,0,0);
    return m;
  }

  function getRange(){
    const now = new Date();
    if (period === 'week') {
      const monday = startOfWeek(now); monday.setDate(monday.getDate() + offset*7);
      const sunday = new Date(monday); sunday.setDate(monday.getDate()+6);
      const sameMonth = monday.getMonth() === sunday.getMonth();
      const label = sameMonth
        ? `${monday.getDate()}–${sunday.getDate()} ${MONTHS_SHORT[monday.getMonth()]} ${monday.getFullYear()+543}`
        : `${monday.getDate()} ${MONTHS_SHORT[monday.getMonth()]} – ${sunday.getDate()} ${MONTHS_SHORT[sunday.getMonth()]} ${sunday.getFullYear()+543}`;
      return { start: toISO(monday), end: toISO(sunday), label };
    }
    if (period === 'month') {
      const base = new Date(now.getFullYear(), now.getMonth()+offset, 1);
      const start = new Date(base.getFullYear(), base.getMonth(), 1);
      const end = new Date(base.getFullYear(), base.getMonth()+1, 0);
      return { start: toISO(start), end: toISO(end), label: `${MONTHS_FULL[base.getMonth()]} ${base.getFullYear()+543}` };
    }
    if (period === 'year') {
      const y = now.getFullYear() + offset;
      return { start: `${y}-01-01`, end: `${y}-12-31`, label: `พ.ศ. ${y+543}` };
    }
    if (period === 'custom') {
      const today = toISO(new Date());
      let s = customStart || today;
      let e = customEnd || today;
      if (s > e) { const t = s; s = e; e = t; }
      const label = s === e ? thaiDate(s) : `${thaiDate(s)} – ${thaiDate(e)}`;
      return { start: s, end: e, label };
    }
    return { start: null, end: null, label: 'ทั้งหมด' };
  }

  function computeStreak(){
    const dateSet = new Set(entries.map(e => e.date));
    let cursor = new Date(); cursor.setHours(0,0,0,0);
    if (!dateSet.has(toISO(cursor))) cursor.setDate(cursor.getDate()-1);
    let count = 0;
    while (dateSet.has(toISO(cursor))) { count++; cursor.setDate(cursor.getDate()-1); }
    return count;
  }

  function monthlyTrend(){
    const now = new Date();
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const base = new Date(now.getFullYear(), now.getMonth()-i, 1);
      const start = toISO(new Date(base.getFullYear(), base.getMonth(), 1));
      const end = toISO(new Date(base.getFullYear(), base.getMonth()+1, 0));
      let inc = 0, exp = 0, nec = 0, unnec = 0;
      for (const e of entries) {
        if (e.date >= start && e.date <= end) {
          if (e.type === 'income') inc += e.amount;
          else { exp += e.amount; if (e.necessary === false) unnec += e.amount; else nec += e.amount; }
        }
      }
      months.push({ label: MONTHS_SHORT[base.getMonth()], fullLabel: `${MONTHS_FULL[base.getMonth()]} ${base.getFullYear()+543}`, income: inc, expense: exp, nec, unnec });
    }
    return months;
  }

  function deltaHtml(curVal, prevVal, goodWhenDown){
    if (prevVal === 0 && curVal === 0) return `<span class="lb-delta flat">– ไม่มีข้อมูล</span>`;
    if (prevVal === 0) return `<span class="lb-delta ${goodWhenDown ? 'bad' : 'good'}">ใหม่ (เดือนก่อนไม่มี)</span>`;
    const diff = curVal - prevVal;
    const diffPct = Math.abs(diff / prevVal * 100);
    if (diff === 0) return `<span class="lb-delta flat">– เท่าเดิม</span>`;
    const up = diff > 0;
    const isGood = goodWhenDown ? !up : up;
    return `<span class="lb-delta ${isGood ? 'good' : 'bad'}">${up ? '▲' : '▼'} ${pct(diffPct)}%</span>`;
  }

  function trendSvg(months){
    const w = 620, h = 160, padB = 22, padT = 6, groupW = w / months.length;
    const max = Math.max(1, ...months.map(m => Math.max(m.income, m.expense)));
    const barW = Math.min(20, groupW/3.2);
    let bars = '';
    months.forEach((m, i) => {
      const gx = i*groupW + groupW/2;
      const incH = (m.income/max) * (h-padB-padT);
      const expH = (m.expense/max) * (h-padB-padT);
      const incX = gx - barW - 3, expX = gx + 3;
      bars += `<rect x="${incX}" y="${h-padB-incH}" width="${barW}" height="${incH}" rx="2" fill="var(--green)"></rect>`;
      bars += `<rect x="${expX}" y="${h-padB-expH}" width="${barW}" height="${expH}" rx="2" fill="var(--red)"></rect>`;
      bars += `<text x="${gx}" y="${h-6}" font-size="10.5" fill="var(--muted)" text-anchor="middle">${m.label}</text>`;
    });
    return `<svg class="lb-trend-svg" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
      <line x1="0" y1="${h-padB}" x2="${w}" y2="${h-padB}" stroke="var(--paper-line)" stroke-width="1"></line>
      ${bars}
    </svg>`;

  function assetStats(asset){
    let contribute = 0, withdraw = 0, dividend = 0;
    for (const t of asset.transactions) {
      if (t.kind === 'contribute') contribute += t.amount;
      else if (t.kind === 'withdraw') withdraw += t.amount;
      else if (t.kind === 'dividend') dividend += t.amount;
    }
    const netContributed = contribute - withdraw;
    const currentValue = (asset.currentValue != null) ? asset.currentValue : netContributed;
    const gain = currentValue + dividend - netContributed;
    const gainPct = netContributed !== 0 ? (gain/netContributed*100) : 0;
    return { netContributed, currentValue, dividend, gain, gainPct };
  }

  const PIE_COLORS = ['#14453d','#b8863b','#9c3b34','#2f6b4f','#6f6252','#7d5a9e','#3f8fa6','#c2703f'];

  function pieSvg(catList, total){
    const size = 220, cx = 110, cy = 110, r = 88, rInner = 52;
    if (!total) return '';
    let angle = -Math.PI/2;
    let paths = '';
    catList.forEach(([cat, amt], i) => {
      const frac = amt/total;
      const nextAngle = angle + frac * Math.PI * 2;
      const x1 = cx + r*Math.cos(angle), y1 = cy + r*Math.sin(angle);
      const x2 = cx + r*Math.cos(nextAngle), y2 = cy + r*Math.sin(nextAngle);
      const ix1 = cx + rInner*Math.cos(nextAngle), iy1 = cy + rInner*Math.sin(nextAngle);
      const ix2 = cx + rInner*Math.cos(angle), iy2 = cy + rInner*Math.sin(angle);
      const large = (nextAngle-angle) > Math.PI ? 1 : 0;
      const color = PIE_COLORS[i % PIE_COLORS.length];
      paths += `<path d="M${x1},${y1} A${r},${r} 0 ${large} 1 ${x2},${y2} L${ix1},${iy1} A${rInner},${rInner} 0 ${large} 0 ${ix2},${iy2} Z" fill="${color}" opacity="0.92"></path>`;
      angle = nextAngle;
    });
    return `<svg viewBox="0 0 ${size} ${size}" style="width:100%;max-width:220px;display:block;margin:0 auto" xmlns="http://www.w3.org/2000/svg">${paths}</svg>`;
  }

  function pieLegend(catList, total){
    return `<div style="display:flex;flex-wrap:wrap;gap:8px 14px;justify-content:center;margin-top:12px">
      ${catList.map(([cat,amt],i) => `<span style="display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted)"><i style="width:9px;height:9px;border-radius:2px;background:${PIE_COLORS[i%PIE_COLORS.length]};display:inline-block"></i>${escapeHtml(cat)} (${pct(amt/total*100)}%)</span>`).join('')}
    </div>`;
  }

  function goalStats(g){
    const target = g.target || 0;
    const current = g.current || 0;
    const remaining = Math.max(0, target - current);
    const progressPct = target > 0 ? Math.min(100, (current/target*100)) : 0;
    let daysLeft = null;
    if (g.due) {
      const d = new Date(g.due + 'T00:00:00');
      const now = new Date(); now.setHours(0,0,0,0);
      daysLeft = Math.ceil((d-now)/(1000*60*60*24));
    }
    return { remaining, progressPct, daysLeft, done: current >= target && target > 0 };
  }

  function recurringDueList(){
    const now = new Date();
    const monthStart = toISO(new Date(now.getFullYear(), now.getMonth(), 1));
    const due = [];
    for (const r of recurring) {
      if (!r.active) continue;
      const dueDate = new Date(now.getFullYear(), now.getMonth(), Math.min(r.day, 28));
      if (dueDate > now) continue;
      const already = entries.some(e => e.recurringId === r.id && e.date >= monthStart);
      if (!already && !dismissedDue.has(r.id + '-' + monthStart)) due.push(r);
    }
    return due;
  }

  function groupByDate(sorted){
    const groups = []; let cur = null;
    for (const e of sorted) {
      if (!cur || cur.date !== e.date) { cur = { date: e.date, items: [] }; groups.push(cur); }
      cur.items.push(e);
    }
    return groups;
  }

  function downloadJSON(){
    const payload = { entries, customCats, budget, assets, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], {type: 'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `ledger-backup-${todayStr()}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  }

  function handleImportFile(file){
    const reader = new FileReader();
    reader.onload = () => {

        if (!Array.isArray(data.entries)) throw new Error('invalid');
        modal = { kind: 'import', payload: data };
        render();
      } catch(e) {
        alert('ไฟล์ไม่ถูกต้อง ไม่สามารถนำเข้าข้อมูลได้');

          <div class="lb-submitrow">
            <button type="submit" class="lb-submit">${editingId ? 'บันทึกการแก้ไข' : '+ บันทึกรายการ'}</button>

    } else if (modal && modal.kind === 'deleteAsset') {
      modalHtml = `<div class="lb-modal-overlay"><div class="lb-modal"><h3>ลบสินทรัพย์นี้?</h3><p>ประวัติการทำรายการทั้งหมดของสินทรัพย์นี้จะถูกลบไปด้วย ยืนยันหรือไม่</p><div class="lb-modal-actions"><button class="cancel" id="lb-modal-cancel">ยกเลิก</button><button class="confirm" id="lb-modal-confirm">ลบสินทรัพย์</button></div></div></div>`;

    }

    root.innerHTML = `
      <div class="lb-book">
        <div class="lb-header">
          <div class="lb-title-row">
            <div>
              <p class="lb-eyebrow">สมุดบัญชี</p>

            </div>
            <div class="lb-headrow-right">
              ${streak > 0 ? `<span class="lb-streak">🔥 ${streak} วัน</span>` : ''}
              <button class="lb-theme-btn" id="lb-theme-toggle" title="สลับโหมดมืด/สว่าง">${theme==='dark'?'☀️':'🌙'}</button>

            <div class="lb-userchip">

          <div class="lb-balance-row">

            <span class="lb-balance-amt">${fmt(totalBalance)} ฿</span>
          </div>
          ${assets.length > 0 ? `<div class="lb-networth">ความมั่งคั่งสุทธิ (เงินสด + ลงทุน) <b>${fmt(netWorth)} ฿</b></div>` : ''}
          <div class="lb-maintabs">
            <button data-view="dashboard" class="${view==='dashboard'?'active':''}">แดชบอร์ด</button>
            <button data-view="record" class="${view==='record'?'active':''}">บันทึกรายการ</button>
            <button data-view="invest" class="${view==='invest'?'active':''}">ออม/ลงทุน</button>

          <input type="file" id="lb-import-file" accept="application/json" style="display:none">
        </div>

        ${bodyHtml}

        <div class="lb-footer">ข้อมูลซิงค์กับบัญชี Google ของคุณอัตโนมัติ • เห็นเฉพาะคุณ</div>
        ${modalHtml}
      </div>
      ${(!unlocked && !authLoading) ? signinScreenHtml() : ''}
    `;

    bindLockEvents();
    const signoutBtn = root.querySelector('#lb-signout');
    if (signoutBtn) signoutBtn.addEventListener('click', signOutGoogle);
    if (!unlocked) return;

    root.querySelector('#lb-export').addEventListener('click', downloadJSON);
    root.querySelector('#lb-import-trigger').addEventListener('click', () => root.querySelector('#lb-import-file').click());
    root.querySelector('#lb-import-file').addEventListener('change', (ev) => {
      if (ev.target.files && ev.target.files[0]) handleImportFile(ev.target.files[0]);
    });

    if (modal) {
      const cancelBtn = root.querySelector('#lb-modal-cancel');
      const confirmBtn = root.querySelector('#lb-modal-confirm');
      if (cancelBtn) cancelBtn.addEventListener('click', () => { modal = null; render(); });
      if (confirmBtn) confirmBtn.addEventListener('click', async () => {
        if (modal.kind === 'delete') {
          entries = entries.filter(e => e.id !== modal.id);
          await saveEntries();
        } else if (modal.kind === 'deleteAsset') {
          assets = assets.filter(a => a.id !== modal.assetId);
          if (expandedAssetId === modal.assetId) expandedAssetId = null;
          await saveAssets();
        } else if (modal.kind === 'deleteTxn') {
          const a = assets.find(x => x.id === modal.assetId);
          if (a) a.transactions = a.transactions.filter(t => t.id !== modal.txnId);
          await saveAssets();
        } else if (modal.kind === 'import') {
          entries = modal.payload.entries || [];
          customCats = modal.payload.customCats || {income:[],expense:[]};
          budget = modal.payload.budget || null;
          assets = modal.payload.assets || [];
          await Promise.all([saveEntries(), saveCats(), saveBudget(), saveAssets()]);
        }
        modal = null;
        render();
      });
    }

    root.querySelectorAll('.lb-maintabs button').forEach(btn => btn.addEventListener('click', () => { view = btn.dataset.view; editingId = null; render(); }));

      period = btn.dataset.period; offset = 0;
      if (period === 'custom' && !customStart && !customEnd) {
        const now = new Date();
        customStart = toISO(new Date(now.getFullYear(), now.getMonth(), 1));
        customEnd = toISO(now);
      }
      render();
    }));
    const prevBtn = root.querySelector('#lb-prev'); const nextBtn = root.querySelector('#lb-next');
    const csInput = root.querySelector('#lb-custom-start'); const ceInput = root.querySelector('#lb-custom-end');
    if (csInput) csInput.addEventListener('change', (ev) => { customStart = ev.target.value; render(); });
    if (ceInput) ceInput.addEventListener('change', (ev) => { customEnd = ev.target.value; render(); });
    if (prevBtn) prevBtn.addEventListener('click', () => { offset -= 1; render(); });
    if (nextBtn) nextBtn.addEventListener('click', () => { if (offset < 0) { offset += 1; render(); } });

    const themeBtn = root.querySelector('#lb-theme-toggle');
    if (themeBtn) themeBtn.addEventListener('click', async () => {
      theme = theme === 'dark' ? 'light' : 'dark';
      applyTheme();
      await saveTheme();
      render();
    });

    if (view === 'dashboard') {
      const bInput = root.querySelector('#lb-budget-input');
      const bSave = root.querySelector('#lb-budget-save');
      if (bSave) bSave.addEventListener('click', async () => {
        const v = parseFloat(root.querySelector('#lb-budget-input').value);
        budget = (v && v > 0) ? v : null;
        await saveBudget();
        render();
      });
      root.querySelectorAll('.rec-due-add').forEach(btn => btn.addEventListener('click', async () => {
        const r = recurring.find(x => x.id === btn.dataset.recid);
        if (!r) return;
        entries.push({
          id: Date.now().toString(36)+Math.random().toString(36).slice(2,6),
          date: todayStr(), type: r.type, amount: r.amount, category: r.category || 'อื่นๆ',
          note: r.name, payment: null,
          necessary: r.type === 'expense' ? (r.necessary !== false) : null,
          recurringId: r.id
        });
        await saveEntries();
        render();
      }));
    }

    if (view === 'goals') {
      const addGoalForm = root.querySelector('#goal-add-form');
      if (addGoalForm) addGoalForm.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const name = root.querySelector('#goal-name').value.trim();
        const target = parseFloat(root.querySelector('#goal-target').value);
        const due = root.querySelector('#goal-due').value || null;
        if (!name || !target || target <= 0) return;
        goals.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), name, target, due, current: 0 });
        await saveGoals();
        render();
      });
      root.querySelectorAll('.goal-add-btn').forEach(btn => btn.addEventListener('click', async () => {
        const gid = btn.dataset.goal;
        const input = root.querySelector(`#goal-add-amt-${gid}`);
        const v = parseFloat(input.value);
        if (!v || v <= 0) return;
        const g = goals.find(x => x.id === gid);
        if (!g) return;
        g.current = (g.current || 0) + v;
        await saveGoals();
        render();
      }));
      root.querySelectorAll('.goal-del').forEach(btn => btn.addEventListener('click', async () => {
        goals = goals.filter(g => g.id !== btn.dataset.goal);
        await saveGoals();
        render();
      }));
    }

    if (view === 'invest') {
      const rateInput = root.querySelector('#inv-rate-input');
      const rateSave = root.querySelector('#inv-rate-save');
      if (rateSave) rateSave.addEventListener('click', async () => {
        const v = parseFloat(root.querySelector('#inv-rate-input').value);
        usdRate = (v && v > 0) ? v : 36;
        await saveBudget();
        render();
      });

      const addAssetForm = root.querySelector('#inv-add-asset-form');
      if (addAssetForm) addAssetForm.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const name = root.querySelector('#inv-asset-name').value.trim();
        const atype = root.querySelector('#inv-asset-type').value;
        const acurrency = root.querySelector('#inv-asset-currency').value;
        if (!name) return;
        const id = Date.now().toString(36) + Math.random().toString(36).slice(2,6);
        assets.push({ id, name, type: atype, currency: acurrency, currentValue: null, transactions: [] });
        expandedAssetId = id;
        await saveAssets();
        render();
      });

      root.querySelectorAll('[data-toggle]').forEach(el => el.addEventListener('click', () => {
        const id = el.dataset.toggle;
        expandedAssetId = expandedAssetId === id ? null : id;
        render();
      }));

      root.querySelectorAll('.inv-kind-btn').forEach(btn => btn.addEventListener('click', () => {
        txnKindByAsset[btn.dataset.asset] = btn.dataset.kind;
        render();
      }));

      root.querySelectorAll('.inv-txn-add-btn').forEach(btn => btn.addEventListener('click', async () => {
        const assetId = btn.dataset.asset;
        const dateEl = root.querySelector(`#inv-txn-date-${assetId}`);
        const amtEl = root.querySelector(`#inv-txn-amount-${assetId}`);
        const amount = parseFloat(amtEl.value);
        if (!amount || amount <= 0) return;
        const a = assets.find(x => x.id === assetId);
        if (!a) return;
        const kind = txnKindByAsset[assetId] || 'contribute';
        a.transactions.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), date: dateEl.value || todayStr(), kind, amount });
        await saveAssets();
        render();
      }));

      root.querySelectorAll('.inv-txn-del').forEach(btn => btn.addEventListener('click', () => {
        modal = { kind: 'deleteTxn', assetId: btn.dataset.asset, txnId: btn.dataset.txn };
        render();
      }));

      root.querySelectorAll('.inv-value-save').forEach(btn => btn.addEventListener('click', async () => {
        const assetId = btn.dataset.asset;
        const input = root.querySelector(`#inv-value-${assetId}`);
        const v = parseFloat(input.value);
        const a = assets.find(x => x.id === assetId);
        if (!a) return;
        a.currentValue = (v || v === 0) ? v : null;
        await saveAssets();
        render();
      }));

      root.querySelectorAll('.inv-asset-del').forEach(btn => btn.addEventListener('click', () => {
        modal = { kind: 'deleteAsset', assetId: btn.dataset.asset };
        render();
      }));
    }

    if (view === 'record') {
      const recAddForm = root.querySelector('#rec-add-form');
      const recTypeSel = root.querySelector('#rec-type');
      if (recTypeSel) recTypeSel.addEventListener('change', (ev) => { recForm.type = ev.target.value; render(); });
      root.querySelectorAll('.rec-toggle button').forEach(btn => btn.addEventListener('click', () => { recForm.necessary = Number(btn.dataset.recnec); render(); }));
      if (recAddForm) recAddForm.addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const name = root.querySelector('#rec-name').value.trim();
        const rtype = root.querySelector('#rec-type').value;
        const amount = parseFloat(root.querySelector('#rec-amount').value);
        const day = Math.min(28, Math.max(1, parseInt(root.querySelector('#rec-day').value) || 1));
        if (!name || !amount || amount <= 0) return;
        recurring.push({ id: Date.now().toString(36)+Math.random().toString(36).slice(2,6), name, type: rtype, amount, day, category: 'อื่นๆ', active: true, necessary: rtype === 'expense' ? (recForm.necessary === 1) : null });
        recForm = { name: '', type: 'expense', category: '', amount: '', day: 1, necessary: 1 };
        await saveRecurring();
        render();
      });
      root.querySelectorAll('.rec-del').forEach(btn => btn.addEventListener('click', async () => {
        recurring = recurring.filter(r => r.id !== btn.dataset.recid);
        await saveRecurring();
        render();
      }));
      root.querySelectorAll('.lb-day-folder').forEach(btn => btn.addEventListener('click', () => {
        const d = btn.dataset.day;
        if (expandedDays.has(d)) expandedDays.delete(d); else expandedDays.add(d);
        render();
      }));
      const expandAllBtn = root.querySelector('#lb-expand-all');
      const collapseAllBtn = root.querySelector('#lb-collapse-all');
      if (expandAllBtn) expandAllBtn.addEventListener('click', () => {
        let vis = periodEntries;
        if (filterCategory) vis = vis.filter(e => e.category === filterCategory);
        if (searchText.trim()) {
          const q = searchText.trim().toLowerCase();
          vis = vis.filter(e => (e.category||'').toLowerCase().includes(q) || (e.note||'').toLowerCase().includes(q));
        }
        expandedDays = new Set(vis.map(e => e.date));
        render();
      });
      if (collapseAllBtn) collapseAllBtn.addEventListener('click', () => {
        expandedDays = new Set();
        render();
      });
      root.querySelectorAll('.rec-day-save').forEach(btn => btn.addEventListener('click', async () => {
        const rid = btn.dataset.recid;
        const input = root.querySelector(`.rec-day-input[data-recid="${rid}"]`);
        const day = Math.min(28, Math.max(1, parseInt(input.value) || 1));
        const r = recurring.find(x => x.id === rid);
        if (!r) return;
        r.day = day;
        await saveRecurring();
        render();
      }));

      root.querySelectorAll('.lb-toggle:not(.necessary):not(.rec-toggle) button').forEach(btn => btn.addEventListener('click', () => { type = btn.dataset.type; render(); }));
      root.querySelectorAll('.lb-toggle.necessary button').forEach(btn => btn.addEventListener('click', () => { necessary = Number(btn.dataset.nec); render(); }));

      root.querySelector('#lb-addcat-toggle').addEventListener('click', () => { addCatMode = !addCatMode; render(); });
      const addcatGo = root.querySelector('#lb-addcat-go');
      if (addcatGo) addcatGo.addEventListener('click', async () => {
        const val = root.querySelector('#lb-newcat').value.trim();
        if (!val) return;
        if (!customCats[type].includes(val) && !DEFAULT_CATS[type].includes(val)) customCats[type].push(val);
        await saveCats();
        addCatMode = false;
        editingEntryCat = val;
        render();
        editingEntryCat = null;
      });
      const addcatCancel = root.querySelector('#lb-addcat-cancel');
      if (addcatCancel) addcatCancel.addEventListener('click', () => { addCatMode = false; render(); });

      const searchInput = root.querySelector('#lb-search');
      if (searchInput) searchInput.addEventListener('input', (ev) => { searchText = ev.target.value; rerenderPreserveFocus(); });
      const filterSel = root.querySelector('#lb-filtercat');
      if (filterSel) filterSel.addEventListener('change', (ev) => { filterCategory = ev.target.value; render(); });

      root.querySelectorAll('.lb-entry').forEach(row => {
        row.addEventListener('click', (ev) => {
          if (ev.target.closest('.lb-del')) return;
          const id = row.dataset.id;
          const e = entries.find(x => x.id === id);
          if (!e) return;
          editingId = id;
          type = e.type;
          necessary = e.necessary === false ? 0 : 1;
          formVals = { date: e.date, amount: e.amount, note: e.note || '' };
          addCatMode = false;
          render();
          const catSel = root.querySelector('#lb-cat');
          if (catSel) catSel.value = e.category;
          const paySel = root.querySelector('#lb-pay');
          if (paySel && e.payment) paySel.value = e.payment;
          root.querySelector('.lb-book').scrollIntoView({behavior:'smooth', block:'start'});
        });
      });

      root.querySelectorAll('.lb-del').forEach(btn => btn.addEventListener('click', (ev) => {
        ev.stopPropagation();
        modal = { kind: 'delete', id: btn.dataset.id };
        render();
      }));

      const cancelEditBtn = root.querySelector('#lb-cancel-edit');
      if (cancelEditBtn) cancelEditBtn.addEventListener('click', () => { editingId = null; formVals = {date: todayStr(), amount:'', note:''}; render(); });

      root.querySelector('#lb-form').addEventListener('submit', async (ev) => {
        ev.preventDefault();
        const date = root.querySelector('#lb-date').value || todayStr();
        const amount = parseFloat(root.querySelector('#lb-amount').value);
        const category = root.querySelector('#lb-cat').value;
        const payment = root.querySelector('#lb-pay').value;
        const note = root.querySelector('#lb-note').value.trim();
        if (!amount || amount <= 0) return;

        if (editingId) {
          const idx = entries.findIndex(e => e.id === editingId);
          if (idx > -1) {
            entries[idx] = { ...entries[idx], date, type, amount, category, note, payment: payment || null, necessary: type === 'expense' ? (necessary === 1) : null };
          }
          editingId = null;
        } else {
          entries.push({ id: Date.now().toString(36) + Math.random().toString(36).slice(2,6), date, type, amount, category, note, payment: payment || null, necessary: type === 'expense' ? (necessary === 1) : null });
        }
        formVals = { date: todayStr(), amount: '', note: '' };
        await saveEntries();
        render();
      });
    }
  }

  root.innerHTML = `<div class="lb-empty"><b>กำลังโหลด…</b></div>`;

  onAuthStateChanged(auth, async (user) => {
    authLoading = false;
    if (user) {
      currentUser = { uid: user.uid, email: user.email, displayName: user.displayName, photoURL: user.photoURL };
      unlocked = true;
      await loadAll();
    } else {
      currentUser = null;
      unlocked = false;
      entries = []; customCats = {income:[],expense:[]}; budget = null; assets = [];
      goals = []; recurring = []; theme = 'light';
      applyTheme();
      render();
    }
  });
})();
</script>

</body>
</html>
